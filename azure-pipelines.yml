# ============================================================
# Azure DevOps Pipeline — Playwright Test Suite
# Free tier safe: uses 1 Microsoft-hosted agent (no parallelism)
# Estimated usage: ~10-15 mins per run / 1,800 mins free/month
# ============================================================

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main

pool:
  name: Default  # Self-hosted agent

variables:
  NODE_VERSION: '20.x'
  BASE_URL: 'http://localhost:3000/parabank/'

stages:
  - stage: Test
    displayName: 'Playwright Tests'
    jobs:
      - job: PlaywrightTests
        displayName: 'Run Playwright Suite'
        timeoutInMinutes: 30  # Hard cap to protect free tier minutes

        steps:
          # 1. Start Parabank container
          - script: |
              docker pull parasoft/parabank
              docker run -d -p 3000:8080 --name parabank parasoft/parabank
            displayName: 'Start Parabank Docker container'

          # 2. Initialise the database
          - script: |
              echo "Waiting for Parabank to start..."
              npx wait-on http://localhost:3000/parabank/ --timeout 60000
              curl -X POST http://localhost:3000/parabank/services/bank/initializeDB
            displayName: 'Initialise Parabank database'

          # 3. Set up Node
          - task: NodeTool@0
            inputs:
              versionSpec: $(NODE_VERSION)
            displayName: 'Install Node.js'

          # 4. Install dependencies
          - script: npm ci
            displayName: 'Install npm dependencies'

          # 5. Install Playwright browsers
          #    --with-deps installs OS-level dependencies too
          - script: npx playwright install chromium --with-deps
            displayName: 'Install Playwright browsers'
            # NOTE: chromium only — installing all browsers would be slow
            # and burn free tier minutes. Add firefox/webkit only if needed.

          # 6. Run tests
          - script: npx playwright test
            displayName: 'Run Playwright tests'
            env:
              BASE_URL: $(BASE_URL)
            continueOnError: true  # Ensures artifacts are published even on failure

          # 7. Generate Allure HTML report
          - script: npx allure generate allure-results --clean -o allure-report
            displayName: 'Generate Allure report'
            condition: always()

          # 8. Publish Allure report as artifact (browse in Azure UI)
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Allure Report'
            inputs:
              targetPath: allure-report
              artifact: allure-report
              publishLocation: pipeline
            condition: always()

          # 9. Publish Playwright HTML report as artifact
          - task: PublishPipelineArtifact@1
            displayName: 'Publish Playwright HTML Report'
            inputs:
              targetPath: playwright-report
              artifact: playwright-report
              publishLocation: pipeline
            condition: always()

          # 10. Publish JUnit XML — this is what makes the Tests tab appear
          - script: |
              echo "Checking for junit.xml..."
              dir test-results /s /b 2>nul || echo "test-results dir not found or empty"
            displayName: 'Diagnose test-results folder'
            condition: always()

          - task: PublishTestResults@2
            displayName: 'Publish Test Results'
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: "test-results/junit.xml"
              searchFolder: $(System.DefaultWorkingDirectory)
              failTaskOnFailedTests: false
            condition: always()

          # 8. Stop and remove Parabank container (prevents conflicts on next run)
          - script: |
              docker stop parabank || true
              docker rm parabank || true
            displayName: 'Teardown Parabank container'
            condition: always()
