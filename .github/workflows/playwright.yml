name: Playwright Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Start Parabank container
        run: |
          docker run -d \
            --name parabank \
            -p 3000:8080 \
            parasoft/parabank
          echo "Waiting for Parabank to start..."
          timeout 120 bash -c 'until curl -sf http://localhost:3000/parabank/index.htm; do sleep 3; done'
          echo "Parabank is up"

      - name: Initialize Parabank database
        run: |
          curl -X POST http://localhost:3000/parabank/services/bank/initializeDB
          echo "Database initialized"

      - name: Run API tests
        run: npx playwright test --project=api

      - name: Run UI tests (Chromium)
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
