# ============================================================
# AWS CodeBuild — Playwright Test Suite (buildspec.yml)
# Free tier safe: targets BUILD_GENERAL1_SMALL instance only
# Estimated usage: ~8-12 mins per run / 100 mins free/month
# WARNING: 100 mins is tight — use this for smoke tests only,
# not a full regression suite, to stay within the free tier.
# ============================================================

version: 0.2

env:
  variables:
    NODE_VERSION: "20"
    BASE_URL: "http://localhost:3000/parabank/"
  # Store sensitive values in AWS SSM Parameter Store (free)
  # and reference them here rather than hardcoding:
  # parameter-store:
  #   AUTH_TOKEN: "/playwright/auth-token"

phases:
  install:
    runtime-versions:
      nodejs: 20  # Use Node 20 — available on free tier instances

    commands:
      # Install dependencies
      - npm ci

      # Install Chromium OS dependencies — method depends on the package manager
      # Ubuntu/Debian (standard:7.0 image) uses apt-get
      # Amazon Linux uses yum — Playwright's --with-deps only supports apt-get
      - |
        if command -v apt-get &> /dev/null; then
          npx playwright install chromium --with-deps
        else
          # Amazon Linux: install known Chromium dependencies via yum then install browser
          yum install -y atk cups-libs gtk3 libXcomposite libXcursor libXdamage \
            libXext libXi libXrandr libXScrnSaver libXtst pango alsa-lib \
            nss mesa-libgbm || true
          npx playwright install chromium
        fi

  pre_build:
    commands:
      - echo "Starting Playwright test run at $(date)"
      - echo "Node version $(node --version)"
      # Start Parabank container
      - docker pull parasoft/parabank
      - docker run -d -p 3000:8080 --name parabank parasoft/parabank
      # Wait for Parabank to be ready (up to 3 mins) then initialise the DB
      # Using curl instead of wait-on — tolerates redirects and non-2xx during startup
      - |
        echo "Waiting for Parabank..."
        for i in $(seq 1 36); do
          if curl -sf --max-time 5 http://localhost:3000/parabank/index.htm > /dev/null 2>&1; then
            echo "Parabank is up after ${i}x5s"
            break
          fi
          echo "  attempt ${i}/36..."
          sleep 5
        done
      - curl -X POST http://localhost:3000/parabank/services/bank/initializeDB

  build:
    commands:
      # Run tests — chromium only to keep within free tier limits
      # Add --reporter=junit so results can be parsed by CodeBuild
      - npx playwright test --reporter=list,junit
    
    # Build does not fail the pipeline immediately on test failure —
    # we handle that in post_build so artifacts still get uploaded
    finally:
      - echo "Test run complete"

  post_build:
    commands:
      - echo "Build completed at $(date)"

artifacts:
  # Upload Playwright HTML report and test results to S3
  # The S3 bucket is specified in your CodeBuild project config.
  # Use a free-tier S3 bucket — standard storage is free up to 5GB for 12 months.
  files:
    - playwright-report/**/*
    - test-results/**/*
  name: playwright-results-$(date +%Y-%m-%d)
  discard-paths: no

reports:
  # CodeBuild Test Reports — parses JUnit XML and shows results in console
  # This is free within CodeBuild — no extra cost
  playwright-test-reports:
    files:
      - test-results/**/*.xml
    file-format: JUNITXML

cache:
  paths:
    # Cache node_modules to speed up subsequent builds
    # Reduces install phase from ~2 mins to ~30 secs
    - node_modules/**/*
    - ~/.cache/ms-playwright/chromium*  # Cache the Chromium binary too
